<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RealEstate Growth OS</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }
        .login-card h2 {
            margin-bottom: 0.5rem;
            color: var(--primary);
        }
        .login-card p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .btn-login {
            width: 100%;
            padding: 0.8rem;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: background 0.2s;
        }
        .btn-login:hover {
            background: var(--primary-hover);
        }
        .error-msg {
            color: var(--dept-leads);
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div style="font-size: 2.5rem; margin-bottom: 0.5rem;">⚡</div>
    <h2>Growth OS</h2>
    <p>Sign in to access the multi-agent system</p>

    <form id="login-form">
        <div class="form-group">
            <label for="username">Username (admin/manager/sales)</label>
            <input type="text" id="username" value="admin" required>
        </div>
        <div class="form-group">
            <label for="password">PIN Code</label>
            <input type="password" id="password" value="" required>
        </div>
        <button type="submit" class="btn-login" id="login-btn">Sign In</button>
        <div id="error-msg" class="error-msg">Invalid credentials.</div>
    </form>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('error-msg');

    const u = document.getElementById('username').value;
    const p = document.getElementById('password').value;

    btn.textContent = 'Authenticating...';
    btn.disabled = true;
    err.style.display = 'none';

    try {
        const res = await fetch('http://localhost:3000/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: u, password: p})
        });

        const data = await res.json();

        if (res.ok && data.token) {
            localStorage.setItem('jwt_token', data.token);
            localStorage.setItem('user_role', data.role);
            window.location.href = 'index.html';
        } else {
            err.textContent = data.error || 'Authentication failed';
            err.style.display = 'block';
        }
    } catch(e) {
        err.textContent = 'Cannot connect to server.';
        err.style.display = 'block';
    } finally {
        btn.textContent = 'Sign In';
        btn.disabled = false;
    }
});
</script>

</body>
</html>
